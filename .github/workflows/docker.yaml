name: docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false   # don't kill a mid-push build

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. luma2003/systembolaget-mcp

jobs:
  build-and-push:
    name: build + push to ghcr.io
    runs-on: ubuntu-latest
    # Gate on the tests workflow — no bad images in the registry.
    needs: []   # CI runs in parallel; we check its conclusion below.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # The GHA runner's 14 GB disk isn't enough for the ~13 GB final image
      # plus buildx cache plus base layers. Reclaim ~25 GB by dropping
      # pre-installed toolchains we don't need.
      - name: reclaim disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # - semver tag (from git tag)
          # - `latest` on default branch
          # - short SHA always
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache — buildkit writes the layer graph there, next run
          # skips re-downloading the CUDA base + the torch+CUDA wheel install.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only amd64 for now — the sb-embed service targets the user's
          # x86_64 TrueNAS + 1080Ti.
          platforms: linux/amd64
