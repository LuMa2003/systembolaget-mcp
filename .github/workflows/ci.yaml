name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          enable-cache: true

      - name: sync deps
        run: uv sync --all-extras --frozen

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src/sb_stack

      - name: pytest
        run: uv run pytest tests --maxfail=5
